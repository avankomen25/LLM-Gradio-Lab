name: integration-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq python-dotenv

      - name: Run integration doctests (requires GROQ_API_KEY secret)
        run: |
          python -c "
          import chat, doctest
          # Run only the Chat class doctests which make live API calls
          results = doctest.testmod(chat, verbose=True)
          assert results.failed == 0, f'{results.failed} doctest(s) failed'
          "
